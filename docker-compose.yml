
version: '3.9'

services:
  web:
    build: .
    container_name: agency_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: agency_db
    environment:
      POSTGRES_DB: agency_db
      POSTGRES_USER: agency_user
      POSTGRES_PASSWORD: secret123
    volumes:
      - pgdata:/var/lib/postgresql/data/

volumes:
  pgdata: